name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 138.2.6.44
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/pmp
            git pull origin main
            cd server
            npm install --production=false
            sudo systemctl restart pmp
            sleep 2
            curl -sf http://localhost:3000/api/health && echo "=== Deploy OK ===" || echo "Health check FAILED"
