name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 138.2.6.44
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/pmp
            # Discard any runtime-modified tracked files (legacy db-shm/db-wal
            # tracked in earlier commits) so git pull never aborts.
            git checkout -- . || true
            git fetch origin main
            git reset --hard origin/main
            cd server
            npm install --production=false
            npm run db:migrate
            sudo systemctl restart pmp
            sleep 2
            curl -sf http://localhost:3000/api/health && echo "=== Deploy OK ===" || (echo "Health check FAILED"; exit 1)
