<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard – PMLib</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/mobile-base.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="font-settings.js"></script>
  <script src="lib/books-config.js"></script>
  <script src="lib/progress.js"></script>
  <style>
    :root {
      --navy:   #1a2744;
      --gold:   #c9a84c;
      --gold-l: #e8d5a3;
      --cream:  #fdf8f0;
      --text:   #2c2c2c;
      --dim:    #666;
      --border: #e0d8c8;
      --green:  #27ae60;
      --blue:   #2980b9;
      --red:    #e74c3c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 52px;
      box-shadow: 0 2px 16px rgba(0,0,0,.2);
    }
    .nav-back {
      color: var(--gold-l); text-decoration: none; font-size: 14px;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border: 1px solid rgba(201,168,76,.3); border-radius: 6px;
      transition: all .2s; min-height: 44px;
    }
    .nav-back:hover { background: rgba(201,168,76,.15); color: #fff; }
    .nav-title {
      font-family: 'Merriweather', serif; font-size: 15px;
      color: rgba(255,255,255,.75); flex: 1; text-align: center;
    }
    .nav-font-btn {
      background: rgba(255,255,255,.08); border: 1px solid rgba(201,168,76,.3);
      color: var(--gold); font-weight: 700; font-size: 14px;
      padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: all .2s;
      min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center;
    }
    .nav-font-btn:hover { background: rgba(201,168,76,.15); color: #fff; }

    /* ── LAYOUT ── */
    .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 80px; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--navy);
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
      display: flex; align-items: center; gap: 10px;
    }

    /* ── STATS GRID ── */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 12px; margin-bottom: 36px;
    }
    .stat-card {
      background: white; border: 1px solid var(--border);
      border-radius: 8px; padding: 18px 16px; text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
    }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--gold); line-height: 1; margin-bottom: 6px; }
    .stat-card .lbl { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }

    /* ── BOOK CARDS ── */
    .book-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
    .book-card {
      background: white; border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      transition: box-shadow .2s;
    }
    .book-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); }
    .book-card-head {
      background: linear-gradient(135deg, var(--navy) 0%, #2a3a6a 100%);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 3px solid var(--gold);
    }
    .book-num {
      font-family: 'Merriweather', serif; font-size: 22px; font-weight: 700;
      color: var(--gold-l); min-width: 36px; text-align: center;
    }
    .book-info { flex: 1; }
    .book-title { font-family: 'Merriweather', serif; font-size: 15px; color: #fff; font-weight: 700; margin-bottom: 2px; }
    .book-sub { font-size: 12px; color: rgba(255,255,255,.5); font-style: italic; }
    .book-pct-badge {
      font-size: 20px; font-weight: 700; color: var(--gold);
      min-width: 52px; text-align: right;
    }
    .book-card-body { padding: 16px 20px; }

    /* ── overall progress bar ── */
    .book-prog-bar { height: 8px; background: #f0ead6; border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
    .book-prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--navy)); border-radius: 4px; transition: width .5s; }

    /* ── per-chapter rows ── */
    .chap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 6px; }
    .chap-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 9px; border-radius: 5px;
      font-size: 11.5px; font-weight: 600; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; cursor: default;
      border: 1px solid transparent;
    }
    .chap-pill.done   { background: rgba(39,174,96,.12);  border-color: rgba(39,174,96,.3);  color: #1e7a44; }
    .chap-pill.reading{ background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.35); color: #7a5c00; }
    .chap-pill.unread { background: #f5f2eb; border-color: var(--border); color: #999; }
    .chap-pill .pill-icon { font-size: 11px; flex-shrink: 0; }
    .chap-pill .pill-txt { overflow: hidden; text-overflow: ellipsis; }

    /* ── chapter stat summary ── */
    .chap-summary {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 12px; color: var(--dim);
    }
    .chap-summary span { display: flex; align-items: center; gap: 4px; }

    /* ── HIGHLIGHTS ── */
    .hl-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .hl-card {
      flex: 1; min-width: 140px; background: white;
      border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .hl-card .hl-cnt { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
    .hl-card .hl-lbl { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
    .hl-card.yellow .hl-cnt { color: #b8860b; }
    .hl-card.green  .hl-cnt { color: var(--green); }
    .hl-card.red    .hl-cnt { color: var(--red); }
    .hl-card.total  .hl-cnt { color: var(--navy); }

    /* ── recent activity ── */
    .activity-list { display: flex; flex-direction: column; gap: 6px; }
    .activity-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; background: white; border-radius: 7px;
      border: 1px solid var(--border); font-size: 13px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .activity-row .act-icon { font-size: 16px; flex-shrink: 0; }
    .activity-row .act-text { flex: 1; }
    .activity-row .act-book { color: var(--dim); font-size: 11px; }
    .activity-row .act-time { font-size: 11px; color: #aaa; white-space: nowrap; }

    .empty-msg { color: #aaa; font-size: 13px; font-style: italic; padding: 12px 0; }

    @media (max-width: 768px) {
      .top-nav { padding: 0 var(--page-pad); height: 52px; }
      .nav-title { font-size: 13px; }
      .wrap { padding: 20px var(--page-pad) 80px; }
      .stat-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
      .stat-card { padding: 14px 12px; }
      .stat-card .val { font-size: 1.6rem; }
      .stat-card .lbl { font-size: 11px; }
      .chap-grid { grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); }
      body { padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom)); }
    }
    @media (max-width: 380px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="home.html" class="nav-back">&#8592; Thư Viện</a>
  <div class="nav-title">Dashboard – Tiến Độ Học Tập</div>
  <button class="nav-font-btn" id="dash-font-btn" title="Cài đặt font chữ">Aa Font</button>
</nav>

<div class="wrap">

  <!-- ── OVERALL STATS ─────────────────────────────────────────── -->
  <div class="section-label">Tổng quan</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="val" id="total-pct">0%</div><div class="lbl">Hoàn thành tổng</div></div>
    <div class="stat-card"><div class="val" id="total-done">0</div><div class="lbl">Chương đã xong</div></div>
    <div class="stat-card"><div class="val" id="total-reading">0</div><div class="lbl">Đang đọc</div></div>
    <div class="stat-card"><div class="val" id="total-hl">0</div><div class="lbl">Tổng highlight</div></div>
    <div class="stat-card"><div class="val" id="total-notes">0</div><div class="lbl">Ghi chú</div></div>
    <div class="stat-card"><div class="val" id="total-books">2</div><div class="lbl">Cuốn đang học</div></div>
  </div>

  <!-- ── HIGHLIGHTS BY COLOUR ───────────────────────────────────── -->
  <div class="section-label">Highlights theo loại</div>
  <div class="hl-bar" style="margin-bottom:36px;">
    <div class="hl-card yellow"><div class="hl-cnt" id="hl-yellow">0</div><div class="hl-lbl">🟡 Định nghĩa</div></div>
    <div class="hl-card green" ><div class="hl-cnt" id="hl-green" >0</div><div class="hl-lbl">🟢 Quan trọng</div></div>
    <div class="hl-card red"   ><div class="hl-cnt" id="hl-red"   >0</div><div class="hl-lbl">🔴 Ghi nhớ</div></div>
    <div class="hl-card total" ><div class="hl-cnt" id="hl-total" >0</div><div class="hl-lbl">📑 Tổng cộng</div></div>
  </div>

  <!-- ── PMBOK6 BOOK ──────────────────────────────────────────── -->
  <div class="section-label">Tiến độ từng cuốn</div>
  <div class="book-grid" id="book-grid"></div>

  <!-- ── RECENT ACTIVITY ──────────────────────────────────────── -->
  <div class="section-label">Hoạt động gần đây</div>
  <div class="activity-list" id="activity-list"></div>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// Chapter data and progress — loaded from lib/
var PMBOK6_CHAPTERS = window.PMLibConfig ? window.PMLibConfig.getChapters('pmbok6') : [];
var RITA_CHAPTERS   = window.PMLibConfig ? window.PMLibConfig.getChapters('rita')   : [];

function loadPMBOK6() {
  if (!window.PMProgress) return null;
  // Return raw data format expected by renderBookCard callers
  try {
    var raw = localStorage.getItem('pmbok6_progress');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function loadRitaProgress() {
  if (!window.PMProgress) return { visited: {}, lastChap: null };
  var p = PMProgress.getBookProgress('rita');
  var lastChap = p.lastChap;
  // Rebuild visited map for backward-compat with renderBookCard
  var visited = {};
  RITA_CHAPTERS.forEach(function(ch) {
    var status = PMProgress.getChapterStatus('rita', ch.id);
    if (status !== 'unread') visited[ch.id] = { status: status, hlCount: 0 };
  });
  return { visited: visited, lastChap: lastChap };
}

function countHighlights() {
  if (!window.PMProgress) return { yellow:0, green:0, red:0, total:0, notes:0 };
  return PMProgress.countHighlightsByColor(['pmbok6', 'rita']);
}

// ── RENDER BOOK CARD ──────────────────────────────────────────────────────────
function renderBookCard(bookInfo) {
  var chapters   = bookInfo.chapters;
  var getStatus  = bookInfo.getStatus; // fn(ch) → 'done'|'reading'|'unread'
  var readLink   = bookInfo.readLink;
  var icon       = bookInfo.icon;
  var idx        = bookInfo.index;

  var done = 0, reading = 0, unread = 0;
  chapters.forEach(function(ch) {
    var st = getStatus(ch);
    if (st === 'done')    done++;
    else if (st === 'reading') reading++;
    else unread++;
  });
  var total = chapters.length;
  var pct   = total > 0 ? Math.round(done / total * 100) : 0;

  var card = document.createElement('div');
  card.className = 'book-card';

  // head
  card.innerHTML =
    '<div class="book-card-head">' +
      '<div class="book-num">' + icon + '</div>' +
      '<div class="book-info">' +
        '<div class="book-title">' + bookInfo.title + '</div>' +
        '<div class="book-sub">' + bookInfo.subtitle + '</div>' +
      '</div>' +
      '<div class="book-pct-badge">' + pct + '%</div>' +
    '</div>' +
    '<div class="book-card-body">' +
      '<div class="book-prog-bar"><div class="book-prog-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="chap-summary">' +
        '<span>✓ <strong>' + done + '</strong> xong</span>' +
        '<span>● <strong>' + reading + '</strong> đang đọc</span>' +
        '<span>○ <strong>' + unread + '</strong> chưa đọc</span>' +
        '<span>📚 <strong>' + total + '</strong> chương</span>' +
        '<a href="' + readLink + '" style="color:var(--gold);font-weight:600;margin-left:auto;font-size:12px;text-decoration:none;">Đọc ngay →</a>' +
      '</div>' +
      '<div class="chap-grid" id="chap-grid-' + idx + '"></div>' +
    '</div>';

  document.getElementById('book-grid').appendChild(card);

  var grid = document.getElementById('chap-grid-' + idx);
  chapters.forEach(function(ch) {
    var st = getStatus(ch);
    var pill = document.createElement('div');
    pill.className = 'chap-pill ' + st;
    var icon2 = st === 'done' ? '✓' : st === 'reading' ? '●' : '○';
    pill.innerHTML = '<span class="pill-icon">' + icon2 + '</span><span class="pill-txt">' + ch.num + '. ' + ch.title + '</span>';
    pill.title = ch.title + ' — ' + (st === 'done' ? 'Đã xong' : st === 'reading' ? 'Đang đọc' : 'Chưa đọc');
    grid.appendChild(pill);
  });

  return { done: done, reading: reading };
}

// ── RENDER ACTIVITY ───────────────────────────────────────────────────────────
function renderActivity(pmbok6Data, ritaProgress) {
  var items = [];

  // Last-read PMBOK6 chapter
  if (pmbok6Data && pmbok6Data.lastChapter) {
    var ch6 = PMBOK6_CHAPTERS.find(function(c) { return c.id === pmbok6Data.lastChapter; });
    if (ch6) {
      items.push({ icon:'📖', text: ch6.num + '. ' + ch6.title, book:'PMBOK® Guide 6', time:'Gần nhất' });
    }
  }

  // Last-read Rita chapter
  if (ritaProgress.lastChap) {
    var ritaCh = RITA_CHAPTERS.find(function(c) { return c.id === ritaProgress.lastChap; });
    if (ritaCh) {
      items.push({ icon:'📖', text: 'Ch.' + ritaCh.num + ' ' + ritaCh.title, book:'Rita PMP® Exam Prep', time:'Gần nhất' });
    }
  }

  // Chapters recently marked done (PMBOK6)
  if (pmbok6Data && pmbok6Data.progress) {
    PMBOK6_CHAPTERS.slice().reverse().forEach(function(ch) {
      var p = pmbok6Data.progress[ch.id];
      if (p && p.status === 'done' && items.length < 8) {
        items.push({ icon:'✅', text: ch.num + '. ' + ch.title, book:'PMBOK® Guide 6', time:'Xong' });
      }
    });
  }

  var list = document.getElementById('activity-list');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty-msg">Chưa có hoạt động nào. Hãy bắt đầu đọc!</div>';
    return;
  }
  items.slice(0, 8).forEach(function(item) {
    var row = document.createElement('div');
    row.className = 'activity-row';
    row.innerHTML =
      '<span class="act-icon">' + item.icon + '</span>' +
      '<span class="act-text">' + item.text + '<br><span class="act-book">' + item.book + '</span></span>' +
      '<span class="act-time">' + item.time + '</span>';
    list.appendChild(row);
  });
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
(function() {
  var pmbok6 = loadPMBOK6();
  var rita   = loadRitaProgress();
  var hls    = countHighlights();

  // Highlight stats
  document.getElementById('hl-yellow').textContent = hls.yellow;
  document.getElementById('hl-green' ).textContent = hls.green;
  document.getElementById('hl-red'   ).textContent = hls.red;
  document.getElementById('hl-total' ).textContent = hls.total;

  // PMBOK6 book card
  var pmbok6Done = 0, pmbok6Reading = 0;
  var pmbok6Result = renderBookCard({
    index: 'pmbok',
    title: 'PMBOK® Guide Lần 6',
    subtitle: 'Hướng dẫn Quản Lý Dự Án · 16 Chương · Tiếng Việt',
    icon: '📗',
    readLink: 'index.html',
    chapters: PMBOK6_CHAPTERS,
    getStatus: function(ch) {
      if (!pmbok6 || !pmbok6.progress || !pmbok6.progress[ch.id]) return 'unread';
      return pmbok6.progress[ch.id].status || 'unread';
    }
  });
  pmbok6Done    = pmbok6Result.done;
  pmbok6Reading = pmbok6Result.reading;

  // Rita book card
  var ritaResult = renderBookCard({
    index: 'rita',
    title: 'Rita PMP® Exam Prep 11th Edition',
    subtitle: 'Giáo trình luyện thi PMP nổi tiếng · 17 Chương · Tiếng Việt + Song ngữ',
    icon: '📘',
    readLink: 'rita.html?list',
    chapters: RITA_CHAPTERS,
    getStatus: function(ch) {
      return rita.visited[ch.id] ? 'reading' : 'unread';
    }
  });

  // Overall stats
  var allDone    = pmbok6Done + ritaResult.done;
  var allReading = pmbok6Reading + ritaResult.reading;
  var allTotal   = PMBOK6_CHAPTERS.length + RITA_CHAPTERS.length;
  var overallPct = allTotal > 0 ? Math.round(allDone / allTotal * 100) : 0;

  document.getElementById('total-pct').textContent    = overallPct + '%';
  document.getElementById('total-done').textContent   = allDone;
  document.getElementById('total-reading').textContent = allReading;
  document.getElementById('total-hl').textContent     = hls.total;
  document.getElementById('total-notes').textContent  = hls.notes;

  // Recent activity
  renderActivity(pmbok6, rita);

  // Font button
  document.getElementById('dash-font-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var existing = document.getElementById('pmlib-font-panel');
    if (existing) { existing.remove(); return; }
    if (window.PMFontSettings) {
      PMFontSettings.buildPanel(e.currentTarget, { side: 'bottom' });
    }
  });
})();
</script>
