<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMBOK® Guide 6 – Tiếng Việt</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div id="sidebar-header">
    <button id="sidebar-close" aria-label="Đóng menu">✕</button>
    <div class="book-label">PMBOK® Guide</div>
    <h2>Hướng Dẫn Quản Lý Dự Án</h2>
    <div class="edition">Lần xuất bản thứ 6 · Tiếng Việt</div>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-label">Tiến độ: <span id="progress-count">0</span>/16 chương</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <nav id="chapter-nav"></nav>
  <div id="sidebar-footer">
    <a href="home.html" id="btn-home-lib">🏠 Thư Viện</a>
  </div>
</aside>

<!-- OVERLAY for mobile -->
<div id="sidebar-overlay"></div>

<!-- MAIN -->
<div id="main">
  <header id="toolbar">
    <button id="btn-hamburger" aria-label="Mở menu">☰</button>
    <span id="toolbar-chapter-title"></span>
    <div id="toolbar-right">
      <button id="btn-highlights" title="Danh sách highlight & ghi chú">📑 Highlights</button>
      <button id="btn-quiz" title="Quiz luyện tập chương này">📝 Quiz</button>
      <button id="btn-print" title="In chương này">🖨 In</button>
      <button id="btn-mark-done" title="Đánh dấu đã đọc xong">✓ Xong</button>
      <span id="sync-indicator" class="sync-saved">☁ Đã lưu</span>
    </div>
  </header>

  <!-- Chapter content rendered in iframe to preserve original HTML/CSS -->
  <iframe id="chapter-frame" title="Nội dung chương"></iframe>
</div>

<!-- HIGHLIGHTS LIST PANEL -->
<aside id="highlights-panel" hidden>
  <div id="highlights-panel-header">
    <h3>📑 Highlights</h3>
    <button id="highlights-panel-close" aria-label="Đóng">✕</button>
  </div>
  <div id="hl-tabs">
    <button class="hl-tab active" data-tab="chapter">Chương này</button>
    <button class="hl-tab" data-tab="all">Tất cả <span id="hl-all-badge"></span></button>
  </div>
  <div id="hl-filter-bar">
    <button class="hl-filter active" data-color="all">Tất cả</button>
    <button class="hl-filter" data-color="yellow">Định nghĩa</button>
    <button class="hl-filter" data-color="green">Quan trọng</button>
    <button class="hl-filter" data-color="red">Ghi nhớ</button>
  </div>
  <div id="highlights-list"></div>
</aside>

<!-- HIGHLIGHT POPUP (in parent page, positioned over iframe) -->
<div id="highlight-popup" hidden role="toolbar" aria-label="Tô màu văn bản">
  <span class="popup-label">Tô màu:</span>
  <button class="hl-color" data-color="yellow" title="Định nghĩa / Khái niệm" aria-label="Định nghĩa"><span class="hl-swatch"></span></button>
  <button class="hl-color" data-color="green"  title="Quan trọng trong kỳ thi" aria-label="Quan trọng"><span class="hl-swatch"></span></button>
  <button class="hl-color" data-color="red"    title="Cần ghi nhớ / Quy trình" aria-label="Ghi nhớ"><span class="hl-swatch"></span></button>
  <div class="popup-sep"></div>
  <button id="hl-note-btn"   title="Thêm ghi chú">✏️ <span>Ghi chú</span></button>
  <button id="hl-delete-btn" title="Xóa highlight" hidden>🗑 <span>Xóa</span></button>
  <div class="popup-sep"></div>
  <button id="hl-close-btn"  title="Đóng" aria-label="Đóng">✕</button>
</div>

<!-- QUIZ OVERLAY -->
<div id="quiz-overlay" hidden>
  <div id="quiz-box">
    <div id="quiz-head">
      <div>
        <div id="quiz-head-title"></div>
        <div id="quiz-head-sub"></div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <div id="quiz-score-live"></div>
        <button id="quiz-x" aria-label="Đóng quiz">✕</button>
      </div>
    </div>
    <div id="quiz-bar-wrap"><div id="quiz-bar"></div></div>

    <!-- Question screen -->
    <div id="quiz-q-screen">
      <div id="quiz-q-num-badge"></div>
      <div id="quiz-q-body"></div>
      <div id="quiz-opts"></div>
      <div id="quiz-exp" hidden></div>
      <div id="quiz-q-foot">
        <button id="quiz-btn-next" hidden>Câu tiếp theo →</button>
        <button id="quiz-btn-end" hidden>Xem kết quả ✓</button>
      </div>
    </div>

    <!-- Results screen -->
    <div id="quiz-r-screen" hidden>
      <div id="quiz-r-circle">
        <div id="quiz-r-score"></div>
        <div id="quiz-r-pct"></div>
      </div>
      <div id="quiz-r-band"></div>
      <div id="quiz-r-stats"></div>
      <div id="quiz-r-review"></div>
      <div id="quiz-r-foot">
        <button id="quiz-btn-retry">🔄 Làm lại</button>
        <button id="quiz-btn-close2">✕ Đóng</button>
      </div>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div id="note-modal" hidden role="dialog" aria-modal="true" aria-labelledby="note-modal-title">
  <div id="note-modal-box">
    <h3 id="note-modal-title">Ghi chú</h3>
    <textarea id="note-textarea" rows="4" placeholder="Nhập ghi chú..."></textarea>
    <div id="note-modal-actions">
      <button id="note-cancel">Hủy</button>
      <button id="note-save">Lưu</button>
    </div>
  </div>
</div>


<script src="app.js?v=3"></script>
</body>
</html>
